apiVersion: batch/v1
kind: CronJob
metadata:
  name: triage-agent
  namespace: agentic-dev-pipeline-triage
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 240
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: triage-agent
          # The triage agent reads untrusted issue text and needs no Kubernetes
          # API access — it talks to GitHub via the gh CLI. Don't mount a token.
          automountServiceAccountToken: false
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          initContainers:
          - name: write-script
            image: busybox:1.37.0
            command:
            - sh
            - -c
            - printf '%s' "$SCRIPT" > /tmp/triage.sh && chmod +x /tmp/triage.sh
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                cpu: 100m
                memory: 64Mi
            env:
            - name: SCRIPT
              value: |
                #!/bin/bash
                set -e
                export HOME=/home/node

                # In oauth mode, unset ANTHROPIC_API_KEY so Claude Code uses
                # CLAUDE_CODE_OAUTH_TOKEN (subscription billing) instead of API billing.
                [ "${CLAUDE_AUTH_MODE}" = "oauth" ] && unset ANTHROPIC_API_KEY || true

                # List open needs-triage issues
                ISSUES=$(gh issue list \
                  --repo ${TARGET_REPO} \
                  --label needs-triage \
                  --state open \
                  --json number \
                  --jq '.[].number')

                if [ -z "${ISSUES}" ]; then
                  echo "No needs-triage issues found"
                  exit 0
                fi

                for ISSUE_NUMBER in ${ISSUES}; do
                  echo "Triaging issue #${ISSUE_NUMBER}..."
                  PROMPT=$(sed "s/ISSUE_NUMBER/${ISSUE_NUMBER}/g" /config/prompt.txt)
                  claude -p "${PROMPT}" \
                    --allowedTools 'Bash' \
                    --output-format json \
                    > /tmp/triage-${ISSUE_NUMBER}.json 2>&1 || true
                  echo "Done with issue #${ISSUE_NUMBER}"
                done
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: [ALL]
            volumeMounts:
            - name: tmp
              mountPath: /tmp
          containers:
          - name: triage
            image: ${REGISTRY_NAME}:5000/${DEVCONTAINER_IMAGE}:latest
            command: ["/bin/bash", "/tmp/triage.sh"]
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: [ALL]
            env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pipeline-creds
                  key: github-token
            - name: GITHUB_PERSONAL_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pipeline-creds
                  key: github-token
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pipeline-creds
                  key: claude-token
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pipeline-creds
                  key: claude-token
            - name: CLAUDE_AUTH_MODE
              valueFrom:
                secretKeyRef:
                  name: pipeline-creds
                  key: claude-auth-mode
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                cpu: "1"
                memory: 1Gi
            volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: home
              mountPath: /home/node
            - name: prompt
              mountPath: /config
              readOnly: true
          volumes:
          - name: tmp
            emptyDir: {}
          - name: home
            emptyDir: {}
          - name: prompt
            configMap:
              name: triage-prompt
